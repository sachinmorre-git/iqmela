<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <!--
    IQMela — Full Horizontal Lockup (Circles Icon + Wordmark)
    Usage: Website header, email header, documents
  -->

  <!-- === Three Circles Icon (scaled to fit ~280px) === -->
  <g transform="translate(40, 50) scale(0.58)">
    <!-- Bottom circle — Indigo -->
    <circle cx="256" cy="312" r="120" fill="#6366F1" opacity="0.9"/>
    <!-- Top-left circle — Teal -->
    <circle cx="192" cy="200" r="120" fill="#14B8A6" opacity="0.9"/>
    <!-- Top-right circle — Deep Teal -->
    <circle cx="320" cy="200" r="120" fill="#0F766E" opacity="0.9"/>
  </g>

  <!-- === Wordmark === -->
  <!-- "IQ" — Bold Indigo -->
  <text
    x="380"
    y="248"
    font-family="Inter, Satoshi, -apple-system, sans-serif"
    font-weight="700"
    font-size="120"
    fill="#4338CA"
    letter-spacing="-3"
  >IQ</text>

  <!-- "Mela" — Medium Teal -->
  <text
    x="576"
    y="248"
    font-family="Inter, Satoshi, -apple-system, sans-serif"
    font-weight="500"
    font-size="120"
    fill="#0D9488"
    letter-spacing="-1"
  >Mela</text>
</svg>
